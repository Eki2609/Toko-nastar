   <!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zein Kitchen</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#FFF8F0; color:#5A3E2B; }
  .animasi-ramadhan { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index:10; }
  .bintang, .bulan { position:absolute; background:gold; border-radius:50%; animation:turun 15s linear infinite; }
  .bulan { width:30px; height:30px; border-radius:50% 50% 50% 0; transform: rotate(-45deg); }
  .kue { position:absolute; width:30px; height:30px; background:#F4A460; border-radius:50%; animation:melayang 10s linear infinite; }
  @keyframes turun { 0%{top:-50px; transform:translateX(0); opacity:0;} 50%{opacity:1;} 100%{top:100%; transform:translateX(100px); opacity:0;} }
  @keyframes melayang { 0%{top:100%; left:10%; transform:rotate(0deg);} 50%{transform:rotate(180deg);} 100%{top:-50px; left:90%; transform:rotate(360deg);} }
  @keyframes goyang { 0%{transform:rotate(0deg);} 25%{transform:rotate(15deg);} 50%{transform:rotate(-15deg);} 75%{transform:rotate(10deg);} 100%{transform:rotate(0deg);} }
  @media (min-width: 500px) { body { zoom:0.6; } }
</style>
</head>
<body>

<!-- Animasi Ramadhan -->
<div class="animasi-ramadhan">
  <div class="bulan" style="left:10%; animation-duration: 18s;"></div>
  <div class="bintang" style="left:30%; animation-duration: 12s;"></div>
  <div class="bintang" style="left:60%; animation-duration: 16s;"></div>
  <div class="bintang" style="left:80%; animation-duration: 20s;"></div>
  <div class="kue" style="left:15%; animation-duration:12s;"></div>
  <div class="kue" style="left:50%; animation-duration:15s;"></div>
  <div class="kue" style="left:75%; animation-duration:18s;"></div>
</div>

<!-- Hero -->
<div class="text-center p-5 bg-[#FDEBD0] shadow">
  <h1 class="text-2xl font-bold text-[#8B4513]">Zein Kitchen</h1>
  <p class="text-[#A67C52]">Manis, Gurih & Nagih</p>
</div>

<!-- Admin Login Dropdown -->
<div class="p-4">
  <select id="adminDropdown" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]" onchange="adminLogin(this.value)">
    <option value="">--Login Admin--</option>
    <option value="login">🔑 Masuk Admin</option>
  </select>
</div>

<!-- Admin Panel (hidden) -->
<div id="adminPanel" class="p-4 hidden bg-[#FFFDF9] rounded-xl shadow border border-[#F3D7B6]">
  <h2 class="font-bold mb-2 text-[#8B4513]">Panel Admin</h2>
  <label class="text-sm font-semibold mb-1">Password Admin:</label>
  <input type="password" id="adminPass" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]">
  <button onclick="cekAdmin()" class="w-full bg-[#C58940] hover:bg-[#A9712A] text-white p-2 rounded">Login</button>
  <div id="adminActions" class="hidden mt-4">
    <h3 class="font-semibold mb-2">Tambah / Edit Menu</h3>
    <label class="text-sm">Nama Item:</label>
    <input type="text" id="itemName" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]">
    <label class="text-sm">Harga:</label>
    <input type="number" id="itemPrice" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]">
    <label class="text-sm">Gambar (URL):</label>
    <input type="text" id="itemImg" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]">
    <button onclick="tambahItem()" class="w-full bg-[#8B4513] hover:bg-[#6B2E12] text-white p-2 rounded mb-2">Tambah / Update Item</button>
  </div>
</div>

<!-- Menu Container -->
<div class="p-4" id="menuContainer">
  <h2 class="text-xl font-bold mb-3 text-[#8B4513]">Menu 🍪</h2>
  <!-- Menu akan dirender di sini -->
</div>

<!-- Alamat & Pengiriman -->
<div class="p-4">
  <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
    <h2 class="font-bold mb-2 text-[#8B4513]">Alamat Pengiriman 📍</h2>
    <label class="text-sm font-semibold mb-1">Opsi Pengiriman</label>
    <select id="opsiKirim" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]" onchange="togglePengiriman()">
      <option value="COD">🛵 COD (Bayar di Tempat)</option>
      <option value="PickUp">🎒 Ambil Sendiri / Pick Up (Gratis)</option>
      <option value="Transfer">🏦 Transfer Bank</option>
    </select>
    <div id="alamatBlock">
      <label class="text-sm font-semibold mb-1">Lokasi Otomatis</label>
      <textarea id="alamatAuto" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]" placeholder="Klik ambil lokasi otomatis" readonly></textarea>
      <button onclick="ambilLokasi()" class="w-full bg-[#8B4513] hover:bg-[#6B2E12] text-white p-2 rounded transition mb-4">📍 Ambil Lokasi Otomatis</button>
      <label class="text-sm font-semibold mb-1">Detail Alamat</label>
      <textarea id="alamatDetail" class="w-full p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0]" placeholder="Tambahkan detail alamat, nomor rumah, catatan kurir"></textarea>
    </div>
  </div>
</div>

<!-- Ongkir -->
<div class="p-4">
  <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
    <h2 class="font-bold mb-2 text-[#8B4513]">Ongkir 🚚</h2>
    <p id="ongkirText">Ambil lokasi untuk menghitung ongkir COD...</p>
    <input type="hidden" id="ongkir" value="0">
  </div>
</div>

<!-- Metode Pembayaran -->
<div class="p-4">
  <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
    <h2 class="font-bold mb-2 text-[#8B4513]">Metode Pembayaran 💳</h2>
    <select id="metode" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]" onchange="togglePembayaran()">
      <option value="COD">COD (Bayar di Tempat)</option>
      <option value="Transfer">Transfer Bank</option>
    </select>
    <div id="rekening" class="hidden bg-[#FDEBD0] p-3 rounded mb-2 text-sm">
      <div class="flex items-center gap-2 mb-2">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" class="w-16">
        <span class="font-semibold">Bank BCA</span>
      </div>
      <p>No Rekening: <span id="norek" class="font-bold">3450062480</span></p>
      <p>Atas Nama: <span class="font-bold">Eki Aryadi</span></p>
      <button onclick="copyRek()" class="bg-[#C58940] text-white px-3 py-1 rounded mt-2">Copy No Rekening</button>
    </div>
    <div id="bukti" class="hidden">
      <label class="text-sm">Upload Bukti Transfer</label>
      <input type="file" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]">
    </div>
  </div>
</div>

<!-- Total Harga -->
<div class="p-4">
  <div class="bg-[#FDEBD0] p-4 rounded-xl shadow text-center border border-[#F3D7B6]">
    <p class="text-[#6B4226]">Total Harga:</p>
    <h2 id="total" class="text-2xl font-bold text-[#8B4513]">Rp0</h2>
  </div>
</div>

<!-- Checkout -->
<div class="p-4">
  <button onclick="checkout()" class="w-full bg-[#C58940] hover:bg-[#A9712A] text-white p-3 rounded-xl transition">Checkout via WhatsApp</button>
</div>

<!-- Keranjang Belanja -->
<div id="keranjang" class="fixed bottom-5 right-5 w-16 h-16 bg-[#C58940] rounded-full shadow-lg flex items-center justify-center cursor-pointer z-20">
  🛒 <span id="jumlahKeranjang" class="ml-1 font-bold text-white">0</span>
</div>

<script>
const hargaPerKm = 5000;
const penjualLat = -6.259853;
const penjualLng = 106.696360;

// Password Admin
const ADMIN_PASS = "1234";

// Item Menu
let items = JSON.parse(localStorage.getItem('items')) || [
  {id:1,name:"Nastar Original",price:60000,img:"n1.jpg"},
  {id:2,name:"Nastar Keju",price:65000,img:"n2.jpg"}
];

// Render menu
function renderMenu(){
  const container = document.getElementById('menuContainer');
  container.innerHTML = '<h2 class="text-xl font-bold mb-3 text-[#8B4513]">Menu 🍪</h2>';
  items.forEach(item=>{
    const div = document.createElement('div');
    div.className="bg-[#FFFDF9] p-4 rounded-xl shadow mb-4 border border-[#F3D7B6]";
    div.innerHTML = `
      <img src="${item.img}" class="w-full h-40 object-cover rounded-xl mb-2">
      <h3 class="font-semibold text-lg text-[#6B4226]">${item.name}</h3>
      <p class="text-[#C58940] font-bold">Rp${item.price.toLocaleString()}</p>
      <input type="number" min="0" value="0" id="qty${item.id}" class="w-full mt-2 p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0]">`;
    container.appendChild(div);
    attachKeranjang(`qty${item.id}`);
  });
}

// Admin login
function adminLogin(val){
  if(val==="login"){ document.getElementById('adminPanel').classList.remove('hidden'); }
}

// Cek password admin
function cekAdmin(){
  const pass = document.getElementById('adminPass').value;
  if(pass===ADMIN_PASS){
    document.getElementById('adminActions').classList.remove('hidden');
    alert("Login admin berhasil!");
  }else{ alert("Password salah!"); }
}

// Tambah/Update Item
function tambahItem(){
  const name = document.getElementById('itemName').value.trim();
  const price = parseInt(document.getElementById('itemPrice').value)||0;
  const img = document.getElementById('itemImg').value.trim();
  if(!name||price<=0||!img){ alert("Isi semua data item!"); return; }
  const existing = items.find(i=>i.name===name);
  if(existing){ existing.price=price; existing.img=img; }else{ items.push({id:Date.now(),name:name,price:price,img:img}); }
  localStorage.setItem('items', JSON.stringify(items));
  renderMenu();
  alert("Item berhasil ditambahkan/diupdate!");
}

// Keranjang
const keranjang = document.getElementById("keranjang");
const jumlahKeranjang = document.getElementById("jumlahKeranjang");
function updateKeranjang(qty){
  let current = parseInt(jumlahKeranjang.innerText);
  jumlahKeranjang.innerText = current + qty;
  keranjang.style.animation="goyang 0.5s";
  setTimeout(()=>{keranjang.style.animation="";},500);
}

// Attach input qty
function attachKeranjang(idInput){
  const input = document.getElementById(idInput);
  input.addEventListener('input', function(){
    hitungTotal();
    const val = parseInt(this.value)||0;
    renderKeranjangTotal();
  });
}

// Hitung Total
function hitungTotal(){
  let total = 0;
  items.forEach(item=>{
    const qty = parseInt(document.getElementById(`qty${item.id}`).value)||0;
    total += qty*item.price;
  });
  const ongkir = parseInt(document.getElementById('ongkir').value)||0;
  total += ongkir;
  document.getElementById('total').innerText="Rp"+total.toLocaleString();
}

// Render keranjang total
function renderKeranjangTotal(){
  let totalQty=0;
  items.forEach(item=>{
    totalQty += parseInt(document.getElementById(`qty${item.id}`).value)||0;
  });
  jumlahKeranjang.innerText=totalQty;
  keranjang.style.animation="goyang 0.5s";
  setTimeout(()=>{keranjang.style.animation="";},500);
}

// Geolocation
function ambilLokasi(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      const lat=pos.coords.latitude, lng=pos.coords.longitude;
      document.getElementById('alamatAuto').value=`https://www.google.com/maps?q=${lat},${lng}`;
      const jarak = hitungJarak(penjualLat,penjualLng,lat,lng);
      const biaya = Math.ceil(jarak)*hargaPerKm;
      document.getElementById('ongkirText').innerText=`Jarak: ${jarak.toFixed(2)} km | Ongkir COD: Rp${biaya.toLocaleString()}`;
      document.getElementById('ongkir').value=biaya;
      hitungTotal();
    });
  }else{ alert("Geolocation tidak didukung."); }
}
function hitungJarak(lat1,lng1,lat2,lng2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  const c=2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

// Toggle
