<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nastar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- Hero -->
  <div class="text-center p-5 bg-white shadow">
    <h1 class="text-2xl font-bold">Zein Kitchen</h1>
    <p class="text-gray-600">Lembut, Lumer, Premium 😋</p>
  </div>

  <!-- Menu -->
  <div class="p-4">
    <h2 class="text-xl font-bold mb-3">Menu 🔥</h2>

    <div class="bg-white p-4 rounded-xl shadow mb-4">
      <img src="n1.jpg" class="w-full h-40 object-cover rounded-xl mb-2">
      <h3 class="font-semibold text-lg">Nastar Original</h3>
      <p>Rp60.000</p>
      <input type="number" id="qty1" value="0" min="0" class="w-full mt-2 p-2 border rounded">
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <img src="n2.jpg" class="w-full h-40 object-cover rounded-xl mb-2">
      <h3 class="font-semibold text-lg">Nastar Keju</h3>
      <p>Rp65.000</p>
      <input type="number" id="qty2" value="0" min="0" class="w-full mt-2 p-2 border rounded">
    </div>
  </div>

  <!-- Alamat -->
  <div class="p-4">
    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="font-bold mb-2">Alamat Pengiriman 📍</h2>
      <textarea id="alamat" class="w-full p-2 border rounded mb-2" placeholder="Masukkan alamat lengkap"></textarea>

      <button onclick="ambilLokasi()" 
      class="w-full bg-blue-500 text-white p-2 rounded">
        📍 Ambil Lokasi Otomatis
      </button>
    </div>
  </div>

  <!-- Ongkir -->
  <div class="p-4">
    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="font-bold mb-2">Ongkir 🚚</h2>
      <select id="ongkir" class="w-full p-2 border rounded">
        <option value="0">Ambil sendiri (Gratis)</option>
        <option value="10000">Dekat (10.000)</option>
        <option value="20000">Jauh (20.000)</option>
      </select>
    </div>
  </div>

  <!-- 💳 Pembayaran (TAMBAHAN) -->
  <div class="p-4">
    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="font-bold mb-2">Metode Pembayaran 💳</h2>

      <select id="metode" class="w-full p-2 border rounded mb-2" onchange="togglePembayaran()">
        <option value="COD">COD (Bayar di Tempat)</option>
        <option value="Transfer">Transfer Bank</option>
      </select>

      <!-- Rekening -->
      <div id="rekening" class="hidden bg-gray-100 p-3 rounded mb-2 text-sm">
        <div class="flex items-center gap-2 mb-2">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" class="w-16">
          <span class="font-semibold">Bank BCA</span>
        </div>
        <p>No Rekening: <span id="norek" class="font-bold">1234567890</span></p>
        <p>Atas Nama: <span class="font-bold">Zein Kitchen</span></p>

        <button onclick="copyRek()" class="bg-green-500 text-white px-3 py-1 rounded mt-2">
          Copy No Rekening
        </button>
      </div>

      <!-- Upload bukti -->
      <div id="bukti" class="hidden">
        <label class="text-sm">Upload Bukti Transfer</label>
        <input type="file" class="w-full p-2 border rounded mb-2">
      </div>

    </div>
  </div>

  <!-- Total -->
  <div class="p-4">
    <div class="bg-white p-4 rounded-xl shadow text-center">
      <p>Total Harga:</p>
      <h2 id="total" class="text-2xl font-bold">Rp0</h2>
    </div>
  </div>

  <!-- Checkout -->
  <div class="p-4">
    <button onclick="checkout()" class="w-full bg-green-500 text-white p-3 rounded-xl">
      Checkout via WhatsApp
    </button>
  </div>

  <script>
    const harga1 = 60000;
    const harga2 = 65000;

    function hitungTotal(){
      let q1 = document.getElementById('qty1').value || 0;
      let q2 = document.getElementById('qty2').value || 0;
      let ongkir = document.getElementById('ongkir').value || 0;

      let total = (q1 * harga1) + (q2 * harga2) + parseInt(ongkir);
      document.getElementById('total').innerText = "Rp" + total.toLocaleString();
    }

    document.getElementById('qty1').addEventListener('input', hitungTotal);
    document.getElementById('qty2').addEventListener('input', hitungTotal);
    document.getElementById('ongkir').addEventListener('change', hitungTotal);

    function ambilLokasi(){
      if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(position){
          let lat = position.coords.latitude;
          let lng = position.coords.longitude;

          let linkMaps = "https://www.google.com/maps?q=" + lat + "," + lng;
          document.getElementById('alamat').value = linkMaps;
        });
      }
    }

    function togglePembayaran(){
      const metode = document.getElementById("metode").value;
      const rekening = document.getElementById("rekening");
      const bukti = document.getElementById("bukti");

      if(metode === "Transfer"){
        rekening.classList.remove("hidden");
        bukti.classList.remove("hidden");
      } else {
        rekening.classList.add("hidden");
        bukti.classList.add("hidden");
      }
    }

    function copyRek(){
      const norek = document.getElementById("norek").innerText;
      navigator.clipboard.writeText(norek);
      alert("Nomor rekening disalin!");
    }

    function checkout(){
      let q1 = document.getElementById('qty1').value;
      let q2 = document.getElementById('qty2').value;
      let alamat = document.getElementById('alamat').value;
      let ongkirText = document.getElementById('ongkir').selectedOptions[0].text;
      let ongkir = document.getElementById('ongkir').value;
      let metode = document.getElementById('metode').value;

      let pesan = "Bunda , saya mau pesan:%0A";

      if(q1 > 0){
        pesan += "- Nastar Original: " + q1 + " toples%0A";
      }
      if(q2 > 0){
        pesan += "- Nastar Keju: " + q2 + " toples%0A";
      }

      pesan += "%0AAlamat: " + alamat + "%0A";
      pesan += "Ongkir: " + ongkirText + "%0A";
      pesan += "Metode: " + metode + "%0A";

      let total = (q1 * harga1) + (q2 * harga2) + parseInt(ongkir);
      pesan += "Total: Rp" + total.toLocaleString();

      let url = "https://wa.me/6289610554134?text=" + pesan;
      window.location.href = url;
    }
  </script>

</body>
</html>
