<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zein Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Animasi Ramadhan & Kue Kering -->
  <style>
    body { font-family: sans-serif; overflow-x: hidden; }
    .animasi-ramadhan {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden; z-index: 10;
    }
    .bintang, .bulan { position: absolute; background: gold; border-radius: 50%; }
    .bintang { width: 20px; height: 20px; animation: turun 15s linear infinite; }
    .bulan { width: 30px; height: 30px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); animation: turun 18s linear infinite; }
    .kue { position: absolute; width: 30px; height: 30px; background: #F4A460; border-radius: 50%; animation: melayang 10s linear infinite; }

    @keyframes turun {
      0% { top:-50px; transform:translateX(0); opacity:0; }
      50% { opacity:1; }
      100% { top:100%; transform:translateX(100px); opacity:0; }
    }
    @keyframes melayang {
      0% { top:100%; left:10%; transform:rotate(0deg);}
      50% { transform:rotate(180deg);}
      100% { top:-50px; left:90%; transform:rotate(360deg);}
    }
    @keyframes goyang { 0%{rotate:0deg;}25%{rotate:15deg;}50%{rotate:-15deg;}75%{rotate:10deg;}100%{rotate:0deg;} }

    /* Kunci versi mobile */
    @media (min-width: 480px) {
      body { zoom: 0.5; }
    }
  </style>
</head>
<body class="bg-[#FFF8F0] text-[#5A3E2B]">

<!-- Animasi Ramadhan -->
<div class="animasi-ramadhan">
  <div class="bulan" style="left:10%;"></div>
  <div class="bintang" style="left:30%;"></div>
  <div class="bintang" style="left:60%;"></div>
  <div class="bintang" style="left:80%;"></div>
  <div class="kue" style="left:15%;"></div>
  <div class="kue" style="left:50%;"></div>
  <div class="kue" style="left:75%;"></div>
</div>

<!-- Hero -->
<div class="text-center p-5 bg-[#FDEBD0] shadow">
  <h1 class="text-2xl font-bold text-[#8B4513]">Zein Kitchen</h1>
  <p class="text-[#A67C52]">Manis, Gurih & Nagih</p>
</div>

<!-- Admin Login -->
<div class="p-4 bg-[#FFFDF9] shadow mb-4 rounded-xl">
  <label class="font-semibold">Admin Password:</label>
  <input type="password" id="adminPass" class="w-full p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0]" placeholder="Masukkan password admin">
  <button onclick="loginAdmin()" class="mt-2 w-full bg-[#C58940] text-white p-2 rounded">Login Admin</button>
</div>

<!-- Menu -->
<div class="p-4" id="menuContainer">
  <h2 class="text-xl font-bold mb-3 text-[#8B4513]">Menu 🍪</h2>
  <!-- Menu items akan di-render di sini -->
</div>

<!-- Keranjang -->
<div id="keranjang" class="fixed bottom-5 right-5 w-16 h-16 bg-[#C58940] rounded-full shadow-lg flex items-center justify-center cursor-pointer z-20">
  🛒 <span id="jumlahKeranjang" class="ml-1 font-bold text-white">0</span>
</div>

<!-- Total & Checkout -->
<div class="p-4">
  <div class="bg-[#FDEBD0] p-4 rounded-xl shadow text-center border border-[#F3D7B6]">
    <p class="text-[#6B4226]">Total Harga:</p>
    <h2 id="total" class="text-2xl font-bold text-[#8B4513]">Rp0</h2>
  </div>
</div>
<div class="p-4">
  <button onclick="checkout()" class="w-full bg-[#C58940] hover:bg-[#A9712A] text-white p-3 rounded-xl transition">
    Checkout via WhatsApp
  </button>
</div>

<script>
const hargaPerKm = 5000;
const penjualLat = -6.259853;
const penjualLng = 106.696360;

let menu = [
  {id:1, nama:"Nastar Original", harga:60000, gambar:"n1.jpg"},
  {id:2, nama:"Nastar Keju", harga:65000, gambar:"n2.jpg"}
];

let adminMode = false;
let keranjangTotal = 0;

// Render menu
function renderMenu(){
  const container = document.getElementById("menuContainer");
  container.innerHTML = '<h2 class="text-xl font-bold mb-3 text-[#8B4513]">Menu 🍪</h2>';
  menu.forEach(item=>{
    const div = document.createElement("div");
    div.className = "bg-[#FFFDF9] p-4 rounded-xl shadow mb-4 border border-[#F3D7B6]";
    div.innerHTML = `
      <img src="${item.gambar}" class="w-full h-40 object-cover rounded-xl mb-2">
      <h3 class="font-semibold text-lg text-[#6B4226]">${item.nama}</h3>
      <p class="text-[#C58940] font-bold">Rp${item.harga.toLocaleString()}</p>
      <input type="number" min="0" value="0" data-id="${item.id}" class="w-full mt-2 p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0] menuQty" ${adminMode?'':'oninput="updateCart(this)"'}>
      ${adminMode?`<button onclick="editItem(${item.id})" class="mt-2 w-full bg-[#8B4513] text-white p-2 rounded">Edit Item</button>`:''}
    `;
    container.appendChild(div);
  });
}

// Update keranjang
function updateCart(input){
  let qty = parseInt(input.value)||0;
  let id = parseInt(input.dataset.id);
  let prevTotal = keranjangTotal;
  keranjangTotal = 0;
  document.querySelectorAll(".menuQty").forEach(inp=>{
    let i = menu.find(m=>m.id==inp.dataset.id);
    keranjangTotal += (parseInt(inp.value)||0) * i.harga;
  });
  document.getElementById("total").innerText = "Rp"+keranjangTotal.toLocaleString();
  if(prevTotal != keranjangTotal){
    const cart = document.getElementById("keranjang");
    cart.style.animation = "goyang 0.5s";
    setTimeout(()=>{cart.style.animation='';},500);
    let jumlah = 0;
    document.querySelectorAll(".menuQty").forEach(i=>{jumlah+=parseInt(i.value)||0});
    document.getElementById("jumlahKeranjang").innerText = jumlah;
  }
}

// Checkout
function checkout(){
  let pesan = "Bunda Zein , saya mau pesan:%0A";
  menu.forEach(item=>{
    let qty = parseInt(document.querySelector(`[data-id='${item.id}']`).value)||0;
    if(qty>0) pesan += `- ${item.nama}: ${qty} toples%0A`;
  });
  pesan += `Total: Rp${keranjangTotal.toLocaleString()}`;
  window.location.href = `https://wa.me/6289610554134?text=${pesan}`;
}

// Admin login
function loginAdmin(){
  const pw = document.getElementById("adminPass").value;
  if(pw==="260991Eki"){ // password sederhana
    adminMode=true;
    alert("Mode Admin aktif");
    renderMenu();
  } else {
    alert("Password salah!");
  }
}

// Edit item admin
function editItem(id){
  let item = menu.find(i=>i.id==id);
  let newName = prompt("Nama Item:", item.nama);
  if(newName) item.nama=newName;
  let newPrice = prompt("Harga Item:", item.harga);
  if(newPrice) item.harga=parseInt(newPrice);
  let newImg = prompt("URL Gambar Item:", item.gambar);
  if(newImg) item.gambar=newImg;
  renderMenu();
}

renderMenu();
</script>
</body>
</html>
