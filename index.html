<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nastar - Toko Online</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
  body{background:#FFF8F0;color:#5A3E2B;}

  /* PETA DIPERKECIL */
  #map{
    width:100%;
    height:180px;
    margin-bottom:1rem;
    border-radius:0.5rem;
  }

  #floatingCart{
    position: fixed;
    bottom: 20px;
    right: 20px;
    background:#C58940;
    color:white;
    padding:10px 14px;
    border-radius:9999px;
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    z-index:50;
  }

  #floatingCart img{width:32px;height:32px;}

  .goyang{animation:goyang 0.5s;}
  @keyframes goyang {
    0%{transform:rotate(0);}
    25%{transform:rotate(-15deg);}
    50%{transform:rotate(15deg);}
    75%{transform:rotate(-10deg);}
    100%{transform:rotate(0);}
  }

  /* POPUP TIDAK FULLSCREEN */
  #cartPopup{
    position: fixed;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
    display:none;
    z-index:100;
  }

  #cartPopupContent{
    background:#FFFDF9;
    padding:1rem;
    border-radius:0.5rem;
    width:90%;
    max-width:350px;
    max-height:80vh;
    overflow-y:auto;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
  }
</style>
</head>

<body class="p-4">

<h1 class="text-center text-2xl font-bold mb-4">Zein Kitchen</h1>

<!-- MENU -->
<div class="mb-4">
  <div class="bg-[#FFFDF9] p-4 rounded-xl shadow mb-4 border border-[#F3D7B6]">
    <img src="n1.jpg" class="w-full h-40 object-cover rounded-xl mb-2">
    <h3 class="font-semibold">Nastar Original</h3>
    <p class="text-[#C58940] font-bold">Rp60.000</p>
    <input type="number" id="qty1" value="0" min="0" class="w-full mt-2 p-2 border rounded">
  </div>

  <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
    <img src="n2.jpg" class="w-full h-40 object-cover rounded-xl mb-2">
    <h3 class="font-semibold">Nastar Keju</h3>
    <p class="text-[#C58940] font-bold">Rp65.000</p>
    <input type="number" id="qty2" value="0" min="0" class="w-full mt-2 p-2 border rounded">
  </div>
</div>

<!-- ALAMAT -->
<textarea id="alamatAuto" class="w-full p-2 border rounded mb-2" readonly></textarea>
<textarea id="alamatDetail" class="w-full p-2 border rounded mb-2"></textarea>

<div id="map"></div>

<div class="flex gap-2 mb-4">
  <button onclick="ambilLokasi()" class="flex-1 bg-[#8B4513] text-white p-2 rounded">📍 Ambil Lokasi</button>
  <button onclick="resetLokasi()" class="flex-1 bg-[#C58940] text-white p-2 rounded">❌ Reset</button>
</div>

<!-- ONGKIR -->
<p id="ongkirText">Klik ambil lokasi...</p>
<input type="hidden" id="ongkir" value="0">

<!-- PEMBAYARAN -->
<select id="metode" onchange="togglePembayaran()" class="p-2 border w-full mb-2">
  <option value="COD">COD</option>
  <option value="Transfer">Transfer</option>
</select>

<div id="rekening" class="hidden bg-[#FDEBD0] p-3 rounded">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/BCA_logo.svg/1200px-BCA_logo.svg.png" class="w-16 mb-2">
  <p>No Rekening: <b id="norek">3450062480</b></p>
  <button onclick="copyRek()" class="bg-[#C58940] text-white px-3 py-1 rounded mt-2 w-full">Copy</button>
</div>

<p class="mt-2">Total: <span id="total">Rp0</span></p>

<button onclick="checkout()" class="bg-[#C58940] text-white p-2 w-full mt-2 rounded">
Checkout WhatsApp
</button>

<!-- CART -->
<div id="floatingCart">
  <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png">
  <span id="cartCount">0</span>
</div>

<!-- POPUP -->
<div id="cartPopup">
  <div id="cartPopupContent">
    <h2 class="font-bold mb-2">Keranjang</h2>
    <div id="popupItems"></div>
    <p id="popupTotal"></p>
    <button onclick="closePopup()" class="w-full border mt-2 p-2">Tutup</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const harga1=60000, harga2=65000;
const penjualLat=-6.259853, penjualLng=106.696360;

const cart=document.getElementById('floatingCart');

function hitungTotal(){
  let q1=qty1.value||0, q2=qty2.value||0;
  total.innerText="Rp"+((q1*harga1)+(q2*harga2)).toLocaleString();
}

function updateCart(){
  cartCount.innerText=(+qty1.value)+(+qty2.value);
}

qty1.oninput=qty2.oninput=()=>{hitungTotal();updateCart();};

cart.onclick=()=>{
  popupItems.innerHTML=`Original: ${qty1.value}<br>Keju: ${qty2.value}`;
  popupTotal.innerText=total.innerText;
  cartPopup.style.display="block";
}

function closePopup(){cartPopup.style.display="none";}

function togglePembayaran(){
  rekening.classList.toggle('hidden', metode.value!=='Transfer');
}

function copyRek(){navigator.clipboard.writeText(norek.innerText);}

let map=L.map('map').setView([penjualLat,penjualLng],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker=L.marker([penjualLat,penjualLng],{draggable:true}).addTo(map);

function ambilLokasi(){
 navigator.geolocation.getCurrentPosition(pos=>{
   let lat=pos.coords.latitude,lng=pos.coords.longitude;
   marker.setLatLng([lat,lng]);
   map.setView([lat,lng],15);
 });
}

function resetLokasi(){
 marker.setLatLng([penjualLat,penjualLng]);
}

function checkout(){
 window.location.href="https://wa.me/6289610554134";
}
</script>

</body>
</html>
