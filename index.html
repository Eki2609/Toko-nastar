    <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nastar - Toko Online</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body{background:#FFF8F0;color:#5A3E2B;}
  #map{width:100%;height:250px;margin-bottom:1rem;border-radius:0.5rem;}
  #floatingCart{position: fixed; bottom: 20px; right: 20px; background:#C58940;color:white;padding:10px 14px;border-radius:9999px; display:flex;align-items:center; gap:8px; cursor:pointer; z-index:50; transition: transform 0.2s;}
  #floatingCart img{width:32px;height:32px;}
  .goyang{animation:goyang 0.5s ease-in-out;}
  @keyframes goyang {0%{transform:rotate(0deg);}25%{transform:rotate(-15deg);}50%{transform:rotate(15deg);}75%{transform:rotate(-10deg);}100%{transform:rotate(0deg);}}
  #cartPopup{position: fixed; inset:0; background: rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:50;}
  #cartPopupContent{background:#FFFDF9; padding:1rem; border-radius:0.5rem; width:80%; max-width:400px; position:relative;}
</style>
</head>
<body class="p-4">

<h1 class="text-center text-2xl font-bold mb-4">Zein Kitchen</h1>

<!-- Menu -->
<div class="mb-4">
  <div class="mb-2">
    <p>Nastar Original - Rp60.000</p>
    <input type="number" id="qty1" value="0" min="0" class="p-2 border rounded mb-2 w-full">
  </div>
  <div class="mb-2">
    <p>Nastar Keju - Rp65.000</p>
    <input type="number" id="qty2" value="0" min="0" class="p-2 border rounded w-full">
  </div>
</div>

<!-- Alamat -->
<div class="mb-4">
  <label class="font-bold mb-1 block">Alamat Pengiriman 📍</label>
  <textarea id="alamatAuto" class="w-full p-2 border rounded mb-2" placeholder="Klik ambil lokasi otomatis" readonly></textarea>
  <textarea id="alamatDetail" class="w-full p-2 border rounded mb-2" placeholder="Tambahkan detail alamat, nomor rumah, catatan kurir"></textarea>
  <div id="map"></div>
  <div class="flex gap-2 mb-4">
    <button onclick="ambilLokasi()" class="flex-1 bg-[#8B4513] text-white p-2 rounded">📍 Ambil Lokasi</button>
    <button onclick="resetLokasi()" class="flex-1 bg-[#C58940] text-white p-2 rounded">❌ Reset</button>
  </div>
</div>

<!-- Ongkir -->
<div class="mb-4">
  <p class="font-bold mb-1">Ongkir 🚚</p>
  <p id="ongkirText">Klik ambil lokasi untuk menghitung ongkir COD...</p>
  <input type="hidden" id="ongkir" value="0">
</div>

<!-- Pembayaran -->
<div class="mb-4">
  <label class="font-bold mb-1 block">Metode Pembayaran 💳</label>
  <select id="metode" class="p-2 border rounded w-full" onchange="togglePembayaran()">
    <option value="COD">COD (Bayar di Tempat)</option>
    <option value="Transfer">Transfer Bank</option>
  </select>
  <div id="rekening" class="hidden bg-[#FDEBD0] p-3 rounded mt-2">
    <div class="flex items-center gap-2 mb-2">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" class="w-16">
      <span class="font-semibold">Bank BCA</span>
    </div>
    <p>No Rekening: <span id="norek" class="font-bold">3450062480</span></p>
    <p>Atas Nama: <span class="font-bold">Eki Aryadi</span></p>
    <button onclick="copyRek()" class="bg-[#C58940] text-white px-3 py-1 rounded mt-2 w-full">Copy No Rekening</button>
  </div>
</div>

<!-- Total -->
<div class="mb-4">
  <p>Total Harga: <span id="total" class="font-bold">Rp0</span></p>
</div>

<!-- Checkout -->
<div class="mb-4">
  <button onclick="checkout()" class="bg-[#C58940] text-white px-4 py-2 rounded w-full">Checkout via WhatsApp</button>
</div>

<!-- Keranjang Melayang -->
<div id="floatingCart">
  <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png">
  <span id="cartCount">0</span>
</div>

<!-- Popup Keranjang -->
<div id="cartPopup" class="hidden">
  <div id="cartPopupContent">
    <h2 class="text-lg font-bold mb-2">Keranjang Belanja</h2>
    <div id="popupItems" class="mb-2"></div>
    <p id="popupOngkir" class="mb-1 font-semibold"></p>
    <p id="popupTotal" class="mb-2 font-bold"></p>
    <p id="popupMetode" class="mb-2"></p>
    <p id="popupAlamat" class="mb-2 text-sm"></p>
    <button onclick="checkout()" class="w-full bg-[#C58940] text-white p-2 rounded mb-2">Checkout via WhatsApp</button>
    <button onclick="closePopup()" class="w-full border border-[#C58940] text-[#C58940] p-2 rounded">Tutup</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const harga1=60000, harga2=65000, hargaPerKm=5000;
const penjualLat=-6.259853, penjualLng=106.696360;

const cart=document.getElementById('floatingCart');
const cartCount=document.getElementById('cartCount');

// Total & keranjang
function hitungTotal(){
  let q1=parseInt(document.getElementById('qty1').value)||0;
  let q2=parseInt(document.getElementById('qty2').value)||0;
  let ongkir=parseInt(document.getElementById('ongkir').value)||0;
  document.getElementById('total').innerText="Rp"+((q1*harga1)+(q2*harga2)+ongkir).toLocaleString();
}

function updateCart(change=0){
  let totalItems=(parseInt(document.getElementById('qty1').value)||0)+(parseInt(document.getElementById('qty2').value)||0);
  cartCount.innerText=totalItems;
  if(change!==0){ cart.classList.add('goyang'); setTimeout(()=>cart.classList.remove('goyang'),500);}
}

document.getElementById('qty1').addEventListener('input',()=>{hitungTotal();updateCart(1);});
document.getElementById('qty2').addEventListener('input',()=>{hitungTotal();updateCart(1);});
cart.addEventListener('click',showCartPopup);

// Toggle pembayaran
function togglePembayaran(){
  const metode=document.getElementById('metode').value;
  document.getElementById('rekening').classList.toggle('hidden', metode!=='Transfer');
}
function copyRek(){navigator.clipboard.writeText(document.getElementById('norek').innerText); alert("Nomor rekening disalin!");}

// Jarak
function hitungJarak(lat1,lng1,lat2,lng2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

// Leaflet Map
let map=L.map('map').setView([penjualLat,penjualLng],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
let marker=L.marker([penjualLat,penjualLng],{draggable:true}).addTo(map);
marker.on('dragend',updateOngkir);

function ambilLokasi(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(position){
      const lat=position.coords.latitude, lng=position.coords.longitude;
      document.getElementById('alamatAuto').value=`Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
      marker.setLatLng([lat,lng]); map.setView([lat,lng],15);
      updateOngkir();
    });
  } else alert("Geolocation tidak didukung");
}
function resetLokasi(){
  marker.setLatLng([penjualLat,penjualLng]); map.setView([penjualLat,penjualLng],13);
  document.getElementById('alamatAuto').value="";
  document.getElementById('alamatDetail').value="";
  document.getElementById('ongkirText').innerText="Klik ambil lokasi untuk menghitung ongkir COD...";
  document.getElementById('ongkir').value=0;
  hitungTotal();
  updateCart();
}

function updateOngkir(){
  const pos=marker.getLatLng();
  document.getElementById('alamatAuto').value=`Lat: ${pos.lat.toFixed(6)}, Lng: ${pos.lng.toFixed(6)}`;
  const jarak=hitungJarak(penjualLat,penjualLng,pos.lat,pos.lng);
  const biaya=Math.ceil(jarak)*hargaPerKm;
  document.getElementById('ongkirText').innerText=`Jarak: ${jarak.toFixed(2)} km | Ongkir COD: Rp${biaya.toLocaleString()}`;
  document.getElementById('ongkir').value=biaya;
  hitungTotal();
  updateCart();
}

// Checkout
function checkout(){
  const q1=parseInt(document.getElementById('qty1').value)||0;
  const q2=parseInt(document.getElementById('qty2').value)||0;
  const alamat=document.getElementById('alamatAuto').value;
  const alamatDetail=document.getElementById('alamatDetail').value;
  const ongkirText=document.getElementById('ongkirText').innerText;
  const ongkir=parseInt(document.getElementById('ongkir').value)||0;
  const metode=document.getElementById('metode').value;

  let pesan=`Bunda Zein, saya mau pesan:%0A`;
  if(q1>0) pesan+=`- Nastar Original: ${q1} toples%0A`;
  if(q2>0) pesan+=`- Nastar Keju: ${q2} toples%0A`;
  if(alamat) pesan+=`%0AAlamat Otomatis: ${alamat}%0ADetail: ${alamatDetail}%0A`;
  pesan+=`Ongkir: ${ongkirText}%0AMetode: ${metode}%0ATotal: Rp${((q1*harga1)+(q2*harga2)+ongkir).toLocaleString()}`;
  if(metode==='Transfer') pesan+=`%0ANo Rekening: 3450062480 - Eki Aryadi`;
  window.location.href=`https://wa.me/6289610554134?text=${pesan}`;
}

// Popup Keranjang
function showCartPopup(){
  const q1=parseInt(document.getElementById('qty1').value)||0;
  const q2=parseInt(document.getElementById('qty2').value)||0;
  const ongkirText=document.getElementById('ongkirText').innerText;
  const total=document.getElementById('total').innerText;
  const metode=document.getElementById('metode').value;
  const alamat=document.getElementById('alamatAuto').value;
  const alamatDetail=document.getElementById('alamatDetail').value;

  let htmlItems='';
  if(q1>0) htmlItems+=`<p>- Nastar Original: ${q1} toples</p>`;
  if(q2>0) htmlItems+=`<p>- Nastar Keju: ${q2} toples</p>`;
  if(htmlItems==='') htmlItems='<p>Keranjang kosong</p>';

  document.getElementById('popupItems').innerHTML=htmlItems;
  document.getElementById('popupOngkir').innerText="Ongkir: "+ongkirText;
  document.getElementById('popupTotal').innerText="Total: "+total;
  document.getElementById('popupMetode').innerText="Metode: "+metode;
  if(alamat) document.getElementById('popupAlamat').innerText="Alamat: "+alamat+" "+alamatDetail;
  else document.getElementById('popupAlamat').innerText="Pick Up / Ambil Sendiri";

  document.getElementById('cartPopup').classList.remove('hidden');
}

function closePopup(){
  document.getElementById('cartPopup').classList.add('hidden');
}

togglePembayaran();
updateOngkir();
</script>

</body>
</html>
