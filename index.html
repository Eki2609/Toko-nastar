<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nastar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* Animasi Ramadhan & Kue */
    .animasi-ramadhan {position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index:10;}
    .bintang, .bulan {position: absolute; width:20px; height:20px; background: gold; border-radius:50%; animation: turun 15s linear infinite;}
    .bulan {width:30px; height:30px; border-radius:50% 50% 50% 0; transform:rotate(-45deg);}
    .kue {position:absolute;width:30px;height:30px;background:#F4A460;border-radius:50%;animation:melayang 10s linear infinite;}
    @keyframes turun {0% {top:-50px; transform:translateX(0); opacity:0;} 50% {opacity:1;} 100% {top:100%; transform:translateX(100px); opacity:0;}}
    @keyframes melayang {0% {top:100%; left:10%; transform:rotate(0deg);} 50% {transform:rotate(180deg);} 100% {top:-50px; left:90%; transform:rotate(360deg);}}

    /* Keranjang Melayang */
    #floatingCart {position: fixed; bottom:20px; right:20px; background:#C58940; color:white; padding:10px 14px; border-radius:9999px; box-shadow:0 4px 10px rgba(0,0,0,0.3); display:flex; flex-direction:column; align-items:flex-start; gap:4px; cursor:pointer; z-index:50; transition: transform 0.2s;}
    #floatingCart img {width:32px;height:32px;}
    @keyframes goyang {0%{transform:rotate(0deg);}25%{transform:rotate(-15deg);}50%{transform:rotate(15deg);}75%{transform:rotate(-10deg);}100%{transform:rotate(0deg);}}
    .goyang {animation: goyang 0.5s ease-in-out;}
    #floatingCart:hover {transform: scale(1.1);}
    #cartDetails {display:none; background:#FFFDF9; padding:8px; border-radius:8px; color:#5A3E2B;}
  </style>
</head>
<body class="bg-[#FFF8F0] text-[#5A3E2B]">

  <!-- Animasi Ramadhan Overlay -->
  <div class="animasi-ramadhan">
    <div class="bulan" style="left:10%; animation-duration: 18s;"></div>
    <div class="bintang" style="left:30%; animation-duration: 12s;"></div>
    <div class="bintang" style="left:60%; animation-duration: 16s;"></div>
    <div class="bintang" style="left:80%; animation-duration: 20s;"></div>
    <div class="kue" style="left:15%; animation-duration:12s;"></div>
    <div class="kue" style="left:50%; animation-duration:15s;"></div>
    <div class="kue" style="left:75%; animation-duration:18s;"></div>
  </div>

  <!-- Hero -->
  <div class="text-center p-5 bg-[#FDEBD0] shadow">
    <h1 class="text-2xl font-bold text-[#8B4513]">Zein Kitchen</h1>
    <p class="text-[#A67C52]">Manis, Gurih & Nagih</p>
  </div>

  <!-- Menu -->
  <div class="p-4">
    <h2 class="text-xl font-bold mb-3 text-[#8B4513]">Menu🍪</h2>
    <div class="bg-[#FFFDF9] p-4 rounded-xl shadow mb-4 border border-[#F3D7B6]">
      <img src="n1.jpg" class="w-full h-40 object-cover rounded-xl mb-2">
      <h3 class="font-semibold text-lg text-[#6B4226]">Nastar Original</h3>
      <p class="text-[#C58940] font-bold">Rp60.000</p>
      <div class="flex gap-2 mt-2">
        <button onclick="ubahQty('qty1',-1)" class="bg-[#C58940] text-white px-2 rounded">-</button>
        <input type="number" id="qty1" value="0" min="0" class="w-full p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0] text-center">
        <button onclick="ubahQty('qty1',1)" class="bg-[#C58940] text-white px-2 rounded">+</button>
      </div>
    </div>

    <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
      <img src="n2.jpg" class="w-full h-40 object-cover rounded-xl mb-2">
      <h3 class="font-semibold text-lg text-[#6B4226]">Nastar Keju</h3>
      <p class="text-[#C58940] font-bold">Rp65.000</p>
      <div class="flex gap-2 mt-2">
        <button onclick="ubahQty('qty2',-1)" class="bg-[#C58940] text-white px-2 rounded">-</button>
        <input type="number" id="qty2" value="0" min="0" class="w-full p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0] text-center">
        <button onclick="ubahQty('qty2',1)" class="bg-[#C58940] text-white px-2 rounded">+</button>
      </div>
    </div>
  </div>

  <!-- Alamat & Pengiriman -->
  <div class="p-4">
    <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
      <h2 class="font-bold mb-2 text-[#8B4513]">Alamat Pengiriman 📍</h2>

      <label class="text-sm font-semibold mb-1">Opsi Pengiriman</label>
      <select id="opsiKirim" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]" onchange="togglePengiriman()">
        <option value="COD">🛵 COD (Bayar di Tempat)</option>
        <option value="PickUp">🎒 Ambil Sendiri / Pick Up (Gratis)</option>
        <option value="Transfer">🏦 Transfer Bank</option>
      </select>

      <div id="alamatBlock">
        <label class="text-sm font-semibold mb-1">Nama Penerima</label>
        <input type="text" id="namaPenerima" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]" placeholder="Masukkan nama penerima">

        <label class="text-sm font-semibold mb-1">Lokasi Otomatis</label>
        <textarea id="alamatAuto" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]" placeholder="Klik ambil lokasi otomatis" readonly></textarea>
        <button onclick="ambilLokasi()" class="w-full bg-[#8B4513] hover:bg-[#6B2E12] text-white p-2 rounded transition mb-4">📍 Ambil Lokasi Otomatis</button>

        <div id="map" class="w-full h-40 mb-2 rounded"></div>

        <label class="text-sm font-semibold mb-1">Detail Alamat</label>
        <textarea id="alamatDetail" class="w-full p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0]" placeholder="Tambahkan detail alamat, nomor rumah, catatan kurir"></textarea>
      </div>
    </div>
  </div>

  <!-- Ongkir -->
  <div class="p-4">
    <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
      <h2 class="font-bold mb-2 text-[#8B4513]">Ongkir 🚚</h2>
      <p id="ongkirText">Ambil lokasi untuk menghitung ongkir COD...</p>
      <input type="hidden" id="ongkir" value="0">
    </div>
  </div>

  <!-- Pembayaran -->
  <div class="p-4">
    <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
      <h2 class="font-bold mb-2 text-[#8B4513]">Metode Pembayaran 💳</h2>
      <select id="metode" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]" onchange="togglePembayaran()">
        <option value="COD">COD (Bayar di Tempat)</option>
        <option value="Transfer">Transfer Bank</option>
      </select>
      <div id="rekening" class="hidden bg-[#FDEBD0] p-3 rounded mb-2 text-sm">
        <div class="flex items-center gap-2 mb-2">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" class="w-16">
          <span class="font-semibold">Bank BCA</span>
        </div>
        <p>No Rekening: <span id="norek" class="font-bold">3450062480</span></p>
        <p>Atas Nama: <span class="font-bold">Eki Aryadi</span></p>
      </div>
    </div>
  </div>

  <!-- Total -->
  <div class="p-4">
    <div class="bg-[#FDEBD0] p-4 rounded-xl shadow text-center border border-[#F3D7B6]">
      <p class="text-[#6B4226]">Total Harga:</p>
      <h2 id="total" class="text-2xl font-bold text-[#8B4513]">Rp0</h2>
    </div>
  </div>

  <!-- Checkout -->
  <div class="p-4">
    <button onclick="checkout()" class="w-full bg-[#C58940] hover:bg-[#A9712A] text-white p-3 rounded-xl transition">
      Checkout via WhatsApp
    </button>
  </div>

  <!-- Keranjang Melayang -->
  <div id="floatingCart">
    <div class="flex items-center gap-2">
      <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png">
      <span id="cartCount" class="font-bold text-lg">0</span>
    </div>
    <div id="cartDetails"></div>
  </div>

  <!-- Suara bel -->
  <audio id="bellSound" src="https://freesound.org/data/previews/341/341695_5260870-lq.mp3"></audio>

  <script>
    const harga1 = 60000;
    const harga2 = 65000;
    const hargaPerKm = 5000;
    const penjualLat = -6.259853;
    const penjualLng = 106.696360;

    const bell = document.getElementById('bellSound');
    const cart = document.getElementById('floatingCart');
    const cartCount = document.getElementById('cartCount');
    const cartDetails = document.getElementById('cartDetails');

    let map, marker;

    function hitungTotal(){
      let q1 = parseInt(document.getElementById('qty1').value)||0;
      let q2 = parseInt(document.getElementById('qty2').value)||0;
      let ongkir = parseInt(document.getElementById('ongkir').value)||0;
      let total = (q1*harga1)+(q2*harga2)+ongkir;
      document.getElementById('total').innerText = "Rp"+total.toLocaleString();
      return {q1,q2,ongkir,total};
    }

    function updateCart(change=0){
      const {q1,q2,ongkir,total} = hitungTotal();
      cartCount.innerText = q1+q2;
      cartDetails.innerHTML = `
        ${q1>0?`Nastar Original: ${q1}<br>`:""}
        ${q2>0?`Nastar Keju: ${q2}<br>`:""}
        Ongkir: Rp${ongkir.toLocaleString()}<br>
        Total: Rp${total.toLocaleString()}
      `;
      if(change!==0){
        cart.classList.add('goyang');
        bell.currentTime=0; bell.play();
        setTimeout(()=>cart.classList.remove('goyang'),500);
      }
    }

    function ubahQty(id, delta){
      let el = document.getElementById(id);
      el.value = Math.max(0,parseInt(el.value)+delta);
      hitungTotal(); updateCart(1);
    }

    document.getElementById('qty1').addEventListener('input',()=>{hitungTotal();updateCart(1);});
    document.getElementById('qty2').addEventListener('input',()=>{hitungTotal();updateCart(1);});

    cart.addEventListener('click', ()=>{ cartDetails.style.display=cartDetails.style.display==='block'?'none':'block'; });

    function ambilLokasi(){
      if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(pos){
          let lat = pos.coords.latitude;
          let lng = pos.coords.longitude;
          document.getElementById('alamatAuto').value = `https://www.google.com/maps?q=${lat},${lng}`;
          const jarak = hitungJarak(penjualLat,penjualLng,lat,lng);
          const biaya = Math.ceil(jarak)*hargaPerKm;
          document.getElementById('ongkirText').innerText=`Jarak: ${jarak.toFixed(2)} km | Ongkir COD: Rp${biaya.toLocaleString()}`;
          document.getElementById('ongkir').value=biaya;
          hitungTotal(); updateCart();
          if(!map){
            map = L.map('map').setView([lat,lng],15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
            marker = L.marker([lat,lng]).addTo(map);
          } else {
            marker.setLatLng([lat,lng]); map.setView([lat,lng],15);
          }
        });
      } else alert("Geolocation tidak didukung.");
    }

    function hitungJarak(lat1,lng1,lat2,lng2){
      const R = 6371;
      const dLat = (lat2-lat1)*Math.PI/180;
      const dLng = (lng2-lng1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
      const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
      return R*c;
    }

    function togglePembayaran(){
      const metode = document.getElementById("metode").value;
      document.getElementById("rekening").classList.toggle("hidden",metode!=="Transfer");
    }

    function togglePengiriman(){
      const opsi = document.getElementById("opsiKirim").value;
      document.getElementById("alamatBlock").style.display = opsi==="PickUp"?"none":"block";
      document.getElementById("ongkirText").innerText = opsi==="PickUp"?"Ambil Sendiri / Pick Up - Gratis Ongkir":"Ambil lokasi untuk menghitung ongkir COD...";
      document.getElementById("ongkir").value=0;
      hitungTotal(); updateCart();
      togglePembayaran();
    }

    togglePengiriman();

    function checkout(){
      const {q1,q2,ongkir,total} = hitungTotal();
      let namaPenerima = document.getElementById('namaPenerima').value;
      let alamatAuto = document.getElementById('alamatAuto').value;
      let alamatDetail = document.getElementById('alamatDetail').value;
      let opsiKirim = document.getElementById('opsiKirim').value;
      let metode = document.getElementById('metode').value;

      let pesan = "Bunda Zein, saya mau pesan:%0A";
      if(namaPenerima) pesan += `Nama Penerima: ${namaPenerima}%0A`;
      if(q1>0) pesan += `- Nastar Original: ${q1} toples%0A`;
      if(q2>0) pesan += `- Nastar Keju: ${q2} toples%0A`;
      if(opsiKirim!=="PickUp"){ pesan += `%0AAlamat Otomatis: ${alamatAuto}%0ADetail
