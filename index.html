<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zein Kitchen</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body{background:#FFF8F0;color:#5A3E2B;}
#map{height:180px;border-radius:10px;}
.leaflet-container{z-index:1!important;}

#floatingCart{
position:fixed;bottom:20px;right:20px;
background:#C58940;color:#fff;
padding:10px;border-radius:50px;
display:flex;gap:8px;z-index:50;
}
#floatingCart img{width:30px;}

#cartPopup{
position:fixed;inset:0;
background:rgba(0,0,0,0.4);
display:none;justify-content:center;
align-items:center;z-index:9999;
}
#cartPopupContent{
background:#fff;padding:15px;
border-radius:10px;width:90%;
max-width:420px;max-height:85vh;
overflow:auto;
}
</style>
</head>

<body class="p-4">

<h1 class="text-center text-2xl font-bold mb-4">🍪 Zein Kitchen</h1>

<!-- MENU -->
<div class="grid grid-cols-2 gap-3 mb-4">
<div class="bg-white p-3 rounded shadow relative">
<span class="absolute top-2 right-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">Best Seller</span>
<img src="n1.jpg" class="w-full h-28 object-cover rounded mb-2">
<h3 class="text-sm font-semibold">Nastar Original</h3>
<p class="text-sm">Rp60.000</p>
<div class="flex gap-1 mt-2">
<button onclick="kurang(1)" class="bg-[#C58940] text-white px-2">-</button>
<input id="qty1" type="number" value="0" class="w-full text-center border text-sm">
<button onclick="tambah(1)" class="bg-[#C58940] text-white px-2">+</button>
</div>
</div>

<div class="bg-white p-3 rounded shadow relative">
<span class="absolute top-2 right-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">Best Seller</span>
<img src="n2.jpg" class="w-full h-28 object-cover rounded mb-2">
<h3 class="text-sm font-semibold">Nastar Keju</h3>
<p class="text-sm">Rp65.000</p>
<div class="flex gap-1 mt-2">
<button onclick="kurang(2)" class="bg-[#C58940] text-white px-2">-</button>
<input id="qty2" type="number" value="0" class="w-full text-center border text-sm">
<button onclick="tambah(2)" class="bg-[#C58940] text-white px-2">+</button>
</div>
</div>
</div>

<!-- PENGIRIMAN -->
<select id="pengiriman" onchange="updatePengiriman()" class="w-full p-2 border mb-2">
<option value="antar">🛵 Diantar</option>
<option value="pickup">📦 Pick up (Gratis Ongkir)</option>
</select>

<!-- ALAMAT -->
<textarea id="alamatAuto" class="w-full p-2 border mb-2" readonly placeholder="Alamat otomatis dari peta"></textarea>
<textarea id="alamatDetail" class="w-full p-2 border mb-2" placeholder="Detail alamat"></textarea>

<div id="map"></div>

<div class="flex gap-2 mt-2 mb-2">
<button id="btnLokasi" onclick="ambilLokasi()" class="bg-[#8B4513] text-white p-2 w-full">📍 Ambil Lokasi</button>
<button id="btnReset" onclick="resetLokasi()" class="bg-[#C58940] text-white p-2 w-full">Reset</button>
</div>

<button id="btnMaps" onclick="bukaMaps()" class="bg-blue-600 text-white p-2 w-full mb-2">
📍 Lihat Rute Google Maps
</button>

<p id="ongkirText">Klik lokasi untuk hitung ongkir</p>
<input type="hidden" id="ongkir" value="0">

<!-- PEMBAYARAN -->
<select id="metode" onchange="togglePembayaran()" class="w-full p-2 border mb-2">
<option value="COD">COD</option>
<option value="Transfer">Transfer</option>
</select>

<div id="rekening" class="hidden bg-yellow-100 p-3 rounded">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" class="w-24 mb-2">
<p>No Rekening: <b id="norek">3450062480</b></p>
<p>Atas Nama: <b>Eki Aryadi</b></p>
<button onclick="copyRek()" class="bg-[#C58940] text-white w-full p-2 mt-2 rounded">Copy No Rekening</button>
</div>

<p>Total: <span id="total">Rp0</span></p>

<button onclick="checkout()" class="bg-[#C58940] text-white w-full p-2 mt-2">Checkout WhatsApp</button>

<!-- CART -->
<div id="floatingCart">
<img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png">
<span id="cartCount">0</span>
</div>

<!-- POPUP -->
<div id="cartPopup">
<div id="cartPopupContent">
<h3 class="font-bold mb-2">Keranjang</h3>
<div id="popupItems"></div>
<p id="popupOngkir"></p>
<p id="popupTotal" class="font-bold"></p>
<button onclick="checkout()" class="bg-[#C58940] text-white w-full p-2 mt-2">Checkout</button>
<button onclick="closePopup()" class="border w-full mt-2 p-2">Tutup</button>
</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const harga1=60000,harga2=65000,hargaPerKm=5000;
const penjual=[-6.259853,106.696360];

/* TOTAL & CART */
function hitungTotal(){
let q1=+qty1.value||0,q2=+qty2.value||0,o=+ongkir.value||0;
total.innerText="Rp"+((q1*harga1)+(q2*harga2)+o).toLocaleString();
cartCount.innerText=q1+q2;
}

/* TAMBAH/KURANG */
function tambah(id){let e=document.getElementById('qty'+id);e.value++;hitungTotal();}
function kurang(id){let e=document.getElementById('qty'+id);if(e.value>0)e.value--;hitungTotal();}
qty1.oninput=qty2.oninput=()=>{hitungTotal();};

/* POPUP */
floatingCart.onclick=()=>{
let q1=+qty1.value||0,q2=+qty2.value||0;
popupItems.innerHTML=`
${q1>0?`Nastar Original: ${q1}<br>`:""}
${q2>0?`Nastar Keju: ${q2}<br>`:""}
`;
popupOngkir.innerText=ongkirText.innerText;
popupTotal.innerText="Total: "+total.innerText;
cartPopup.style.display="flex";
}
function closePopup(){cartPopup.style.display="none";}
window.onclick=e=>{if(e.target==cartPopup)cartPopup.style.display="none";}

/* PEMBAYARAN */
function togglePembayaran(){rekening.classList.toggle("hidden",metode.value!=="Transfer");}
function copyRek(){navigator.clipboard.writeText(norek.innerText);alert("Nomor rekening disalin!");}

/* MAP */
let map=L.map('map').setView(penjual,13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker=L.marker(penjual,{draggable:true}).addTo(map);

/* ALAMAT DARI PIN */
async function getAlamat(lat,lng){
try{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
let data=await res.json();
if(data.display_name)alamatAuto.value=data.display_name;
}catch{alamatAuto.value="Gagal ambil alamat";}
}

marker.on('dragend',()=>{let p=marker.getLatLng();getAlamat(p.lat,p.lng);updateOngkir();});

/* HITUNG JARAK & ONGKIR */
function hitungJarak(a,b,c,d){
const R=6371,dLat=(c-a)*Math.PI/180,dLng=(d-b)*Math.PI/180;
const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLng/2)**2;
return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function updateOngkir(){
if(pengiriman.value=="pickup") return;
let p=marker.getLatLng();
let jarak=hitungJarak(penjual[0],penjual[1],p.lat,p.lng);
let biaya=Math.ceil(jarak)*hargaPerKm;
ongkirText.innerText=`Jarak ${jarak.toFixed(2)} km | Ongkir Rp${biaya.toLocaleString()}`;
ongkir.value=biaya;
hitungTotal();
}

/* PENGIRIMAN */
function updatePengiriman(){
if(pengiriman.value=="pickup"){
ongkir.value=0; ongkirText.innerText="Ambil sendiri (Gratis Ongkir)";
alamatAuto.style.display="none"; alamatDetail.style.display="none";
map._container.style.display="none"; btnLokasi.style.display="none";
btnReset.style.display="none"; btnMaps.style.display="none";
}else{
alamatAuto.style.display="block"; alamatDetail.style.display="block";
map._container.style.display="block"; btnLokasi.style.display="block";
btnReset.style.display="block"; btnMaps.style.display="block";
updateOngkir();
}
hitungTotal();
}

/* LOKASI */
function ambilLokasi(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude,lng=pos.coords.longitude;
marker.setLatLng([lat,lng]); map.setView([lat,lng],15);
getAlamat(lat,lng); updateOngkir();
});
}
function resetLokasi(){marker.setLatLng(penjual);alamatAuto.value="";alamatDetail.value="";ongkir.value=0;ongkirText.innerText="Klik lokasi untuk hitung ongkir";hitungTotal();}

/* LINK GOOGLE MAPS */
function bukaMaps(){
let p=marker.getLatLng();
window.open(`https://www.google.com/maps?q=${p.lat},${p.lng}`);
}

/* CHECKOUT */
function checkout(){
let q1=+qty1.value||0,q2=+qty2.value||0,o=+ongkir.value||0;
let p=marker.getLatLng();
let pesan="Bunda Zein, saya mau pesan:%0A";
if(q1>0)pesan+=`- Nastar Original: ${q1}%0A`;
if(q2>0)pesan+=`- Nastar Keju: ${q2}%0A`;
pesan+=`%0APengiriman: ${pengiriman.value}%0A`;
if(pengiriman.value!=="pickup") pesan+=`Lokasi: https://www.google.com/maps?q=${p.lat},${p.lng}%0A`;
pesan+=`Ongkir: ${ongkirText.innerText}%0A`;
pesan+=`Metode: ${metode.value}%0A`;
pesan+=`Total: Rp${((q1*harga1)+(q2*harga2)+o).toLocaleString()}`;
if(metode.value=="Transfer") pesan+=`%0ANo Rek: 3450062480`;
window.location.href=`https://wa.me/6289610554134?text=${pesan}`;
}
</script>

</body>
</html>
