<!DOCTYPE html><html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zein Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>  <style>
    /* Animasi Ramadhan */
    .animasi-ramadhan {
      position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index:10;
    }
    .bintang, .bulan {position:absolute; border-radius:50%; animation:turun 15s linear infinite;}
    .bintang {width:20px; height:20px; background:gold;}
    .bulan {width:30px; height:30px; background:gold; border-radius:50% 50% 50% 0; transform:rotate(-45deg);}
    .kue {position:absolute; width:30px; height:30px; background:#F4A460; border-radius:50%; animation:melayang 10s linear infinite;}
    @keyframes turun {0%{top:-50px;transform:translateX(0);opacity:0;}50%{opacity:1;}100%{top:100%;transform:translateX(100px);opacity:0;}}
    @keyframes melayang {0%{top:100%;left:10%;transform:rotate(0deg);}50%{transform:rotate(180deg);}100%{top:-50px;left:90%;transform:rotate(360deg);}}

    /* Keranjang Melayang */
    #floatingCart {position:fixed; bottom:20px; right:20px; background:#C58940; color:white; padding:10px 14px; border-radius:9999px; box-shadow:0 4px 10px rgba(0,0,0,0.3); display:flex; align-items:center; gap:8px; cursor:pointer; z-index:50; transition:transform 0.2s;}
    #floatingCart img{width:32px;height:32px;}
    @keyframes goyang {0%{transform:rotate(0deg);}25%{transform:rotate(-15deg);}50%{transform:rotate(15deg);}75%{transform:rotate(-10deg);}100%{transform:rotate(0deg);}}
    .goyang{animation:goyang 0.5s ease-in-out;}
    #floatingCart:hover{transform:scale(1.1);}
    .btn-cart{bg-white text-[#C58940] px-2 py-1 rounded font-bold hover:bg-[#f3e1c9];}
  </style></head>
<body class="bg-[#FFF8F0] text-[#5A3E2B]">  <!-- Animasi Ramadhan -->  <div class="animasi-ramadhan">
    <div class="bulan" style="left:10%; animation-duration:18s;"></div>
    <div class="bintang" style="left:30%; animation-duration:12s;"></div>
    <div class="bintang" style="left:60%; animation-duration:16s;"></div>
    <div class="bintang" style="left:80%; animation-duration:20s;"></div>
    <div class="kue" style="left:15%; animation-duration:12s;"></div>
    <div class="kue" style="left:50%; animation-duration:15s;"></div>
    <div class="kue" style="left:75%; animation-duration:18s;"></div>
  </div>  <!-- Hero -->  <div class="text-center p-5 bg-[#FDEBD0] shadow">
    <h1 class="text-2xl font-bold text-[#8B4513]">Zein Kitchen</h1>
    <p class="text-[#A67C52]">Manis,Gurih & Nagih</p>
  </div>  <!-- Menu -->  <div class="p-4">
    <h2 class="text-xl font-bold mb-3 text-[#8B4513]">Menu🍪</h2><div class="bg-[#FFFDF9] p-4 rounded-xl shadow mb-4 border border-[#F3D7B6]">
  <img src="n1.jpg" class="w-full h-40 object-cover rounded-xl mb-2">
  <h3 class="font-semibold text-lg text-[#6B4226]">Nastar Original</h3>
  <p class="text-[#C58940] font-bold">Rp60.000</p>
  <div class="flex gap-2 mt-2">
    <button class="btn-cart" onclick="ubahQty('qty1',-1)">-</button>
    <input type="number" id="qty1" value="0" min="0" class="w-full p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0] text-center">
    <button class="btn-cart" onclick="ubahQty('qty1',1)">+</button>
  </div>
</div>

<div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
  <img src="n2.jpg" class="w-full h-40 object-cover rounded-xl mb-2">
  <h3 class="font-semibold text-lg text-[#6B4226]">Nastar Keju</h3>
  <p class="text-[#C58940] font-bold">Rp65.000</p>
  <div class="flex gap-2 mt-2">
    <button class="btn-cart" onclick="ubahQty('qty2',-1)">-</button>
    <input type="number" id="qty2" value="0" min="0" class="w-full p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0] text-center">
    <button class="btn-cart" onclick="ubahQty('qty2',1)">+</button>
  </div>
</div>

  </div>  <!-- Alamat & Pengiriman -->  <div class="p-4">
    <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
      <h2 class="font-bold mb-2 text-[#8B4513]">Alamat Pengiriman 📍</h2>
      <label class="text-sm font-semibold mb-1">Opsi Pengiriman</label>
      <select id="opsiKirim" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]" onchange="togglePengiriman()">
        <option value="COD">🛵 COD (Bayar di Tempat)</option>
        <option value="PickUp">🎒 Ambil Sendiri / Pick Up (Gratis)</option>
      </select>
      <div id="alamatBlock">
        <label class="text-sm font-semibold mb-1">Lokasi Otomatis</label>
        <div class="flex gap-2 mb-2">
          <textarea id="alamatAuto" class="w-full p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0]" placeholder="Klik ambil lokasi otomatis" readonly></textarea>
          <button onclick="hapusLokasi()" class="bg-red-500 hover:bg-red-600 text-white px-3 rounded">X</button>
        </div>
        <button onclick="ambilLokasi()" class="w-full bg-[#8B4513] hover:bg-[#6B2E12] text-white p-2 rounded transition mb-4">📍 Ambil Lokasi Otomatis</button>
        <label class="text-sm font-semibold mb-1">Detail Alamat</label>
        <textarea id="alamatDetail" class="w-full p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0]" placeholder="Tambahkan detail alamat, nomor rumah, catatan kurir"></textarea>
      </div>
    </div>
  </div>  <!-- Ongkir -->  <div class="p-4">
    <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
      <h2 class="font-bold mb-2 text-[#8B4513]">Ongkir 🚚</h2>
      <p id="ongkirText">Ambil lokasi untuk menghitung ongkir COD...</p>
      <input type="hidden" id="ongkir" value="0">
    </div>
  </div>  <!-- Total -->  <div class="p-4">
    <div class="bg-[#FDEBD0] p-4 rounded-xl shadow text-center border border-[#F3D7B6]">
      <p class="text-[#6B4226]">Total Harga:</p>
      <h2 id="total" class="text-2xl font-bold text-[#8B4513]">Rp0</h2>
    </div>
  </div>  <!-- Checkout -->  <div class="p-4">
    <button onclick="checkout()" class="w-full bg-[#C58940] hover:bg-[#A9712A] text-white p-3 rounded-xl transition">Checkout via WhatsApp</button>
  </div>  <!-- Keranjang Melayang -->  <div id="floatingCart">
    <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png">
    <span id="cartCount" class="font-bold text-lg">0</span>
    <button class="btn-cart" onclick="lihatCart()">🛒</button>
  </div>  <!-- Suara bel --><audio id="bellSound" src="https://freesound.org/data/previews/341/341695_5260870-lq.mp3"></audio>

  <script>
    const harga1=60000, harga2=65000, hargaPerKm=5000, penjualLat=-6.259853, penjualLng=106.696360;
    const bell=document.getElementById('bellSound');
    const cart=document.getElementById('floatingCart');
    const cartCount=document.getElementById('cartCount');

    function hitungTotal(){
      let q1=parseInt(document.getElementById('qty1').value)||0;
      let q2=parseInt(document.getElementById('qty2').value)||0;
      let ongkir=parseInt(document.getElementById('ongkir').value)||0;
      let total=(q1*harga1)+(q2*harga2)+ongkir;
      document.getElementById('total').innerText="Rp"+total.toLocaleString();
    }

    function updateCart(change=0){
      let qty1=parseInt(document.getElementById('qty1').value)||0;
      let qty2=parseInt(document.getElementById('qty2').value)||0;
      let totalItems=qty1+qty2;
      cartCount.innerText=totalItems;
      if(change!==0){
        cart.classList.add('goyang');
        bell.currentTime=0; bell.play();
        setTimeout(()=>cart.classList.remove('goyang'),500);
      }
    }

    function ubahQty(id,val){
      let inp=document.getElementById(id);
      let newVal=parseInt(inp.value)+val;
      if(newVal<0) newVal=0;
      inp.value=newVal;
      hitungTotal(); updateCart(val);
    }

    function lihatCart(){
      let q1=parseInt(document.getElementById('qty1').value)||0;
      let q2=parseInt(document.getElementById('qty2').value)||0;
      let total=document.getElementById('total').innerText;
      alert(`Isi Keranjang:\n- Nastar Original: ${q1}\n- Nastar Keju: ${q2}\nTotal: ${total}`);
    }

    document.getElementById('qty1').addEventListener('input',()=>{hitungTotal();updateCart(1);});
    document.getElementById('qty2').addEventListener('input',()=>{hitungTotal();updateCart(1);});
    cart.addEventListener('click',()=>{window.scrollTo({top:0,behavior:'smooth'});});

    function ambilLokasi(){
      if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(pos=>{
          let lat=pos.coords.latitude, lng=pos.coords.longitude;
          document.getElementById('alamatAuto').value=`https://www.google.com/maps?q=${lat},${lng}`;
          const jarak=hitungJarak(penjualLat,penjualLng,lat,lng);
          const biaya=Math.ceil(jarak)*hargaPerKm;
          document.getElementById('ongkirText').innerText=`Jarak: ${jarak.toFixed(2)} km | Ongkir COD: Rp${biaya.toLocaleString()}`;
          document.getElementById('ongkir').value=biaya;
          hitungTotal();
        });
      }else alert("Geolocation tidak didukung di perangkat ini.");
    }

    function hapusLokasi(){
      document.getElementById('alamatAuto').value='';
      document.getElementById('ongkirText').innerText='Ambil lokasi untuk menghitung ongkir COD...';
      document.getElementById('ongkir').value=0;
      hitungTotal();
    }

    function hitungJarak(lat1,lng1,lat2,lng2){
      const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
      const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
      return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

    function togglePengiriman(){
      const opsi=document.getElementById('opsiKirim').value;
      if(opsi==='PickUp'){
        document.getElementById('alamatBlock').style.display='none';
        document.getElementById('ongkirText').innerText='Ambil Sendiri / Pick Up - Gratis Ongkir';
        document.getElementById('ongkir').value=0;
      }else document.getElementById('alamatBlock').style.display='block';
      hitungTotal(); updateCart();
    }

    togglePengiriman();

    function checkout(){
      let q1=parseInt(document.getElementById('qty1').value)||0;
      let q2=parseInt(document.getElementById('qty2').value)||0;
      let alamatAuto=document.getElementById('alamatAuto').value;
      let alamatDetail=document.getElementById('alamatDetail').value;
      let ongkirText=document.getElementById('ongkirText').innerText;
      let opsiKirim=document.getElementById('opsiKirim').value;
      let pesan="Bunda Zein , saya mau pesan:%0A";
      if(q1>0) pesan+=`- Nastar Original: ${q1} toples%0A`;
      if(q2>0) pesan+=`- Nastar Keju: ${q2} toples%0A`;
      if(opsiKirim!=='PickUp'){pesan+=`%0AAlamat Otomatis: ${alamatAuto}%0ADetail Alamat: ${alamatDetail}%0A`;}else pesan+=`%0ASaya akan mengambil sendiri / Pick Up (Gratis Ongkir)%0A`;
      pesan+=`Ongkir: ${ongkirText}%0ATotal: ${document.getElementById('total').innerText}`;
      window.location.href=`https://wa.me/6289610554134?text=${pesan}`;
    }
  </script></body>
</html>
