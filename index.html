        <!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nastar</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .animasi-ramadhan { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index:10;}
    .bintang, .bulan {position:absolute;width:20px;height:20px;background:gold;border-radius:50%;animation:turun 15s linear infinite;}
    .bulan {width:30px;height:30px;border-radius:50% 50% 50% 0; transform:rotate(-45deg);}
    .kue {position:absolute;width:30px;height:30px;background:#F4A460;border-radius:50%;animation:melayang 10s linear infinite;}
    @keyframes turun {0%{top:-50px;transform:translateX(0);opacity:0;}50%{opacity:1;}100%{top:100%;transform:translateX(100px);opacity:0;}}
    @keyframes melayang {0%{top:100%;left:10%;transform:rotate(0deg);}50%{transform:rotate(180deg);}100%{top:-50px;left:90%;transform:rotate(360deg);}}
    #floatingCart {position: fixed; bottom: 20px; right: 20px; background:#C58940; color:white; padding:10px 14px; border-radius:9999px; box-shadow:0 4px 10px rgba(0,0,0,0.3); display:flex; align-items:center; gap:8px; cursor:pointer; z-index:50; transition: transform 0.2s;}
    #floatingCart img{width:32px;height:32px;}
    @keyframes goyang {0%{transform:rotate(0deg);}25%{transform:rotate(-15deg);}50%{transform:rotate(15deg);}75%{transform:rotate(-10deg);}100%{transform:rotate(0deg);}}
    .goyang{animation:goyang 0.5s ease-in-out;}
    #floatingCart:hover{transform:scale(1.1);}
    #map {width:100%;height:250px;border-radius:12px;}
  </style>
</head>
<body class="bg-[#FFF8F0] text-[#5A3E2B]">

  <!-- Animasi Ramadhan Overlay -->
  <div class="animasi-ramadhan">
    <div class="bulan" style="left:10%; animation-duration:18s;"></div>
    <div class="bintang" style="left:30%; animation-duration:12s;"></div>
    <div class="bintang" style="left:60%; animation-duration:16s;"></div>
    <div class="bintang" style="left:80%; animation-duration:20s;"></div>
    <div class="kue" style="left:15%; animation-duration:12s;"></div>
    <div class="kue" style="left:50%; animation-duration:15s;"></div>
    <div class="kue" style="left:75%; animation-duration:18s;"></div>
  </div>

  <!-- Hero -->
  <div class="text-center p-5 bg-[#FDEBD0] shadow">
    <h1 class="text-2xl font-bold text-[#8B4513]">Zein Kitchen</h1>
    <p class="text-[#A67C52]">Manis,Gurih & Nagih</p>
  </div>

  <!-- Menu -->
  <div class="p-4">
    <h2 class="text-xl font-bold mb-3 text-[#8B4513]">Menu🍪</h2>
    <div class="bg-[#FFFDF9] p-4 rounded-xl shadow mb-4 border border-[#F3D7B6]">
      <img src="n1.jpg" class="w-full h-40 object-cover rounded-xl mb-2">
      <h3 class="font-semibold text-lg text-[#6B4226]">Nastar Original</h3>
      <p class="text-[#C58940] font-bold">Rp60.000</p>
      <input type="number" id="qty1" value="0" min="0" class="w-full mt-2 p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0]">
    </div>
    <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
      <img src="n2.jpg" class="w-full h-40 object-cover rounded-xl mb-2">
      <h3 class="font-semibold text-lg text-[#6B4226]">Nastar Keju</h3>
      <p class="text-[#C58940] font-bold">Rp65.000</p>
      <input type="number" id="qty2" value="0" min="0" class="w-full mt-2 p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0]">
    </div>
  </div>

  <!-- Alamat & Pengiriman (Google Maps) -->
  <div class="p-4">
    <div class="bg-[#FFFDF9] p-4 rounded-xl shadow border border-[#F3D7B6]">
      <h2 class="font-bold mb-2 text-[#8B4513]">Alamat Pengiriman 📍</h2>

      <label class="text-sm font-semibold mb-1">Opsi Pengiriman</label>
      <select id="opsiKirim" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]" onchange="togglePengiriman()">
        <option value="COD">🛵 COD (Bayar di Tempat)</option>
        <option value="PickUp">🎒 Ambil Sendiri / Pick Up (Gratis)</option>
        <option value="Transfer">🏦 Transfer Bank</option>
      </select>

      <div id="alamatBlock">
        <label class="text-sm font-semibold mb-1">Cari Alamat</label>
        <input id="alamatAuto" type="text" placeholder="Ketik alamat untuk pencarian" class="w-full p-2 border border-[#E5C7A9] rounded mb-2 bg-[#FFF8F0]">
        <div id="map"></div>
        <div class="flex gap-2 mb-4">
          <button onclick="ambilLokasi()" class="flex-1 bg-[#8B4513] hover:bg-[#6B2E12] text-white p-2 rounded transition">📍 Ambil Lokasi</button>
          <button onclick="resetLokasi()" class="flex-1 bg-[#C58940] hover:bg-[#A9712A] text-white p-2 rounded transition">❌ Reset</button>
        </div>
        <label class="text-sm font-semibold mb-1">Detail Alamat</label>
        <textarea id="alamatDetail" class="w-full p-2 border border-[#E5C7A9] rounded bg-[#FFF8F0]" placeholder="Tambahkan detail alamat, nomor rumah, catatan kurir"></textarea>
      </div>
    </div>
  </div>

  <!-- Ongkir, Pembayaran, Total, Checkout, Keranjang tetap sama -->

  <!-- Load Google Maps JS (Places API) -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>

  <script>
    let map, marker, autocomplete;
    const penjualLat = -6.259853;
    const penjualLng = 106.696360;
    const hargaPerKm = 5000;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: penjualLat, lng: penjualLng },
        zoom: 13,
      });

      marker = new google.maps.Marker({
        position: { lat: penjualLat, lng: penjualLng },
        map,
        draggable: true,
      });

      // Autocomplete alamat
      const input = document.getElementById("alamatAuto");
      autocomplete = new google.maps.places.Autocomplete(input);
      autocomplete.bindTo("bounds", map);

      autocomplete.addListener("place_changed", function () {
        const place = autocomplete.getPlace();
        if (!place.geometry) return alert("Alamat tidak ditemukan!");
        map.setCenter(place.geometry.location);
        map.setZoom(15);
        marker.setPosition(place.geometry.location);
        hitungOngkir();
      });

      // Dragend marker
      marker.addListener("dragend", hitungOngkir);
    }

    function ambilLokasi() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          map.setCenter({ lat, lng });
          map.setZoom(15);
          marker.setPosition({ lat, lng });
          hitungOngkir();
        });
      } else alert("Geolocation tidak didukung.");
    }

    function resetLokasi() {
      map.setCenter({ lat: penjualLat, lng: penjualLng });
      map.setZoom(13);
      marker.setPosition({ lat: penjualLat, lng: penjualLng });
      document.getElementById("alamatAuto").value = "";
      document.getElementById("ongkirText").innerText = "Ambil lokasi untuk menghitung ongkir COD...";
      document.getElementById("ongkir").value = 0;
      hitungTotal();
      updateCart();
    }

    function hitungJarak(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = ((lat2 - lat1) * Math.PI) / 180;
      const dLng = ((lng2 - lng1) * Math.PI) / 180;
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos((lat1 * Math.PI) / 180) *
          Math.cos((lat2 * Math.PI) / 180) *
          Math.sin(dLng / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function hitungOngkir() {
      const pos = marker.getPosition();
      if (document.getElementById("opsiKirim").value === "COD") {
        const jarak = hitungJarak(penjualLat, penjualLng, pos.lat(), pos.lng());
        const biaya = Math.ceil(jarak) * hargaPerKm;
        document.getElementById(
          "ongkirText"
        ).innerText = `Jarak: ${jarak.toFixed(2)} km | Ongkir COD: Rp${biaya.toLocaleString()}`;
        document.getElementById("ongkir").value = biaya;
        hitungTotal();
        updateCart();
      }
    }

    window.onload = initMap;
  </script>
</body>
</html>
